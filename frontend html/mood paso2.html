<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2397f6",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0A0A0A",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<!-- Sticky Top Navigation Bar -->
<header class="sticky top-0 z-50 flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-6 py-4 md:px-40">
<div class="flex items-center gap-4 text-primary">
<div class="size-6">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M4 42.4379C4 42.4379 14.0962 36.0744 24 41.1692C35.0664 46.8624 44 42.2078 44 42.2078L44 7.01134C44 7.01134 35.068 11.6577 24.0031 5.96913C14.0971 0.876274 4 7.27094 4 7.27094L4 42.4379Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight uppercase">Emotions</h2>
</div>
<div class="flex items-center gap-4">
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-200/50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<main class="flex-1 w-full max-w-[960px] mx-auto px-6 py-8">
<!-- Progress Section -->
<div class="flex flex-col gap-3 mb-10">
<div class="flex justify-between items-end">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold">Paso 2 de 3</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">66% completado</p>
</div>
<div class="h-2 w-full rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-500" style="width: 66%;"></div>
</div>
</div>
<!-- Title Section -->
<div class="mb-8">
<h1 class="text-slate-900 dark:text-white text-3xl font-extrabold leading-tight mb-2">¿Qué necesitas ahora?</h1>
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-sm">sentiment_dissatisfied</span>
<p class="text-slate-600 dark:text-slate-400 text-lg font-medium">Estás sintiéndote <span class="text-primary">Triste</span></p>
</div>
</div>
<!-- Quiz Options Stack -->
<div class="flex flex-col gap-4">
<!-- Option Card 1 -->
<button class="group relative flex items-center gap-6 p-6 rounded-xl bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-primary transition-all text-left">
<div class="flex size-14 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined !text-3xl">cloudy_snowing</span>
</div>
<div class="flex flex-col gap-1">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold group-hover:text-primary transition-colors">Quiero desahogarme</h3>
<p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">Libera tus emociones con música profunda y melancólica.</p>
</div>
<div class="ml-auto opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary">chevron_right</span>
</div>
</button>
<!-- Option Card 2 -->
<button class="group relative flex items-center gap-6 p-6 rounded-xl bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-primary transition-all text-left">
<div class="flex size-14 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined !text-3xl">auto_awesome</span>
</div>
<div class="flex flex-col gap-1">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold group-hover:text-primary transition-colors">Quiero animarme</h3>
<p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">Encuentra el ritmo perfecto para cambiar la energía de tu día.</p>
</div>
<div class="ml-auto opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary">chevron_right</span>
</div>
</button>
<!-- Option Card 3 -->
<button class="group relative flex items-center gap-6 p-6 rounded-xl bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-primary transition-all text-left">
<div class="flex size-14 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined !text-3xl">visibility</span>
</div>
<div class="flex flex-col gap-1">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold group-hover:text-primary transition-colors">Quiero reflexionar</h3>
<p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">Un espacio de calma sonora diseñado para el pensamiento introspectivo.</p>
</div>
<div class="ml-auto opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary">chevron_right</span>
</div>
</button>
</div>
<!-- Footer Action -->
<div class="mt-12 flex justify-start">
<button class="flex items-center gap-2 text-slate-500 hover:text-primary transition-colors font-medium">
<span class="material-symbols-outlined text-sm">arrow_back</span>
                    Atrás
                </button>
</div>
</main>
<!-- Sidebar Mock Navigation (for layout consistency) -->
<nav class="hidden md:fixed left-0 top-0 h-full w-20 flex-col items-center py-24 gap-8 bg-slate-100/50 dark:bg-background-dark/50 border-r border-slate-200 dark:border-slate-800">
<div class="text-primary cursor-pointer">
<span class="material-symbols-outlined !text-3xl">home</span>
</div>
<div class="text-slate-400 hover:text-primary cursor-pointer transition-colors">
<span class="material-symbols-outlined !text-3xl">explore</span>
</div>
<div class="text-slate-400 hover:text-primary cursor-pointer transition-colors">
<span class="material-symbols-outlined !text-3xl">book</span>
</div>
<div class="text-slate-400 hover:text-primary cursor-pointer transition-colors mt-auto">
<span class="material-symbols-outlined !text-3xl">account_circle</span>
</div>
</nav>
</div>
</body></html>
